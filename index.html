<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos - TP4</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <header class="header">
        <h1>Sistema de Alumnos</h1>
        <p class="header__subtitulo">Consumo de API REST - TP4</p>
    </header>

    <main class="container">

        <section class="seccion">
            <h2>Lista de Alumnos</h2>
            <button id="btn-cargar" class="btn btn--primario">Cargar Alumnos</button>
            <p id="mensaje-error" class="mensaje-error oculto"></p>
            <ul id="lista-alumnos" class="lista-alumnos"></ul>
        </section>

        <hr class="separador">

        <section class="seccion">
            <h2>Agregar Alumno Nuevo</h2>
            <form id="form-alumno" class="form-alumno">

                <div class="form-grupo">
                    <label for="legajo">Legajo:</label>
                    <input type="number" id="legajo" required>
                </div>

                <div class="form-grupo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" required>
                </div>

                <div class="form-grupo">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" required>
                </div>

                <p id="mensaje-form" class="mensaje-form oculto"></p>

                <button type="submit" class="btn btn--primario">Guardar Alumno</button>
            </form>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
