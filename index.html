<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="estilos/base.css">
    <link rel="stylesheet" href="estilos/forms.css">
    <link rel="stylesheet" href="estilos/components.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos - TP4</title>
</head>
<body>
    <h1>Sistema de Alumnos (Consumo de API)</h1>
    
    <h2>Lista de Alumnos</h2>
    <button id="btn-cargar">Cargar Alumnos</button>
    <ul id="lista-alumnos"></ul>

    <hr>

    <h2>Agregar Alumno Nuevo</h2>
    <form id="form-alumno">
        <label>Legajo:</label>
        <input type="number" id="legajo" required><br><br>
        
        <label>Nombre:</label>
        <input type="text" id="nombre" required><br><br>
        
        <label>Apellido:</label>
        <input type="text" id="apellido" required><br><br>
        
        <button type="submit">Guardar Alumno</button>
    </form>

    <script src="main.js"></script>
</body>
</html>
